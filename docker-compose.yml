# ============================================================
# Docker Compose - LocalStack Community (Simulação AWS Local)
# ============================================================
# Uso: docker-compose up -d
# Depois: terraform init && terraform plan && terraform apply
# Para parar: docker-compose down

services:
  localstack:
    container_name: onepilates-localstack
    image: localstack/localstack:3.0.0
    ports:
      - "4566:4566"       # Gateway principal (todos os serviços AWS)
      - "4510-4559:4510-4559"  # Portas de serviços externos
    environment:
      - SERVICES=ec2,s3,iam,sts
      - DEBUG=0
      - DOCKER_HOST=unix:///var/run/docker.sock
      - DEFAULT_REGION=us-east-1
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  localstack_data:
